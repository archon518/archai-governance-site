<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acquire Core Architecture Framework — ARCHAI™</title>
  
  <!-- Premium Luxury Typography Matrix Import -->
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Space+Grotesk:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-main: #000000;          /* Absolute Obsidian Black */
      --bg-card: rgba(12, 12, 14, 0.85); /* Dark Matte Black Core */
      --border-gold: #d4af37;      /* Pure Metallic Gold Boundary */
      --text-gold: #f3e5ab;        /* Soft Premium Champagne Gold */
      --text-bright: #ffffff;      /* Crisp High-Contrast White */
      --text-mute: #71717a;        /* Clean Structural Grey */
      --font-luxury: 'Cinzel', serif; 
      --font-display: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-bright);
      font-family: var(--font-display);
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* FIXED HIGH-END NAVIGATION INTERFACE (Wipes Out Purple Overrides) */
    .nav-bar {
      background: rgba(3, 3, 5, 0.85) !important;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(212, 175, 55, 0.15) !important;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      box-sizing: border-box;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none !important;
      color: #ffffff !important;
    }

    .nav-brand-icon {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--border-gold) !important;
    }

    .nav-brand-text {
      font-family: var(--font-luxury);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #ffffff !important;
      line-height: 1;
      margin-bottom: 2px;
    }

    .nav-brand-sub {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--text-mute) !important;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: block;
    }

    .nav-links-group {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    /* HARD LINK OVERRIDES (Guarantees Active Clicks, Blocks Purple Link Code) */
    .nav-link {
      font-family: var(--font-display);
      color: var(--text-bright) !important;
      text-decoration: none !important;
      font-size: 0.88rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .nav-link:hover, .nav-link.active {
      color: var(--border-gold) !important;
      text-decoration: none !important;
    }

    .nav-cta {
      font-family: var(--font-mono);
      background: linear-gradient(135deg, #d4af37 0%, #aa820a 100%) !important;
      color: #000000 !important;
      text-decoration: none !important;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: opacity 0.2s ease;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2);
    }

    .nav-cta:hover {
      opacity: 0.9;
      text-decoration: none !important;
    }

    .pricing-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 160px 24px 100px 24px;
      box-sizing: border-box;
      position: relative;
      z-index: 2;
    }

    .header-group {
      text-align: center;
      margin-bottom: 60px;
    }

    .eyebrow {
      font-family: var(--font-mono);
      color: var(--border-gold);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 12px;
    }

    .page-title {
      font-family: var(--font-luxury);
      font-size: 3.5rem;
      font-weight: 700;
      color: #ffffff;
      margin: 0 0 20px 0;
      letter-spacing: 1px;
      line-height: 1.1;
    }

    .page-title span {
      background: linear-gradient(135deg, #d4af37 0%, #f3e5ab 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }

    .page-subtitle {
      color: #a1a1aa;
      font-size: 1.2rem;
      max-width: 700px;
      margin: 0 auto;
      line-height: 1.6;
      font-weight: 300;
    }

    .tiers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 30px;
      align-items: stretch;
    }

    .card-tier {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 175, 55, 0.15);
      padding: 45px 40px;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(255,255,255,0.02);
      transition: border-color 0.4s ease, transform 0.4s ease, box-shadow 0.4s ease;
      position: relative;
    }

    .card-tier:hover {
      border-color: rgba(212, 175, 55, 0.4);
      transform: translateY(-4px);
    }

    .card-tier.enterprise {
      border: 1px solid rgba(212, 175, 55, 0.4);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.95), 0 0 40px rgba(212, 175, 55, 0.05);
    }

    .card-tier.enterprise:hover {
      border-color: var(--border-gold);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 1), 0 0 50px rgba(212, 175, 55, 0.15);
    }

    .badge-top {
      position: absolute;
      top: -12px;
      right: 30px;
      background: linear-gradient(135deg, #d4af37 0%, #aa820a 100%);
      color: #000000;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 30px;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
    }
  </style>
</head>
