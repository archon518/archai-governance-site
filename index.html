<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARCHONOMY — The Meta-Discipline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a0e;
      --card:#111118;
      --card2:#16161f;
      --border:rgba(255,255,255,.07);
      --border2:rgba(255,255,255,.12);
      --gold:#c9a84c;
      --gold2:#e8c96a;
      --gold-dim:rgba(201,168,76,.15);
      --gold-glow:rgba(201,168,76,.08);
      --gold-glow2:rgba(201,168,76,.35);
      --muted:#5a5a72;
      --muted2:#8a8aa2;
      --text:#c8c8dc;
      --white:#f0f0ff;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:16px;line-height:1.6;overflow-x:hidden}

    /* NAV */
    nav{
      position:fixed;top:0;left:0;right:0;z-index:100;
      padding:0 2rem;
      background:rgba(10,10,14,.92);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
    }
    .nav-inner{
      max-width:1100px;margin:0 auto;
      display:flex;align-items:center;gap:0;
      height:64px;
    }
    .nav-brand{
      display:flex;align-items:center;gap:.75rem;
      margin-right:2.5rem;flex-shrink:0;
    }
    .nav-icon{
      width:36px;height:36px;border-radius:10px;
      background:radial-gradient(135deg at 30% 30%,#2a2218,#0e0e0e);
      border:1px solid rgba(201,168,76,.3);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 12px rgba(201,168,76,.15);
    }
    .nav-icon svg{width:18px;height:18px}
    .nav-brand-text{}
    .nav-brand-name{font-size:.82rem;font-weight:700;letter-spacing:.18em;color:var(--white);text-transform:uppercase}
    .nav-brand-sub{font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-top:1px}
    .nav-links{display:flex;gap:0;flex:1}
    .nav-link{
      padding:0 1.1rem;height:64px;display:flex;align-items:center;
      font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;
      color:var(--muted2);text-decoration:none;transition:color .2s;
      border-bottom:2px solid transparent;position:relative;top:1px;
    }
    .nav-link:hover{color:var(--white)}
    .nav-link.active{color:var(--gold);border-bottom-color:var(--gold)}
    .nav-cta{
      margin-left:auto;
      font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;
      color:var(--bg);background:var(--gold);
      padding:.5rem 1.3rem;border-radius:6px;text-decoration:none;
      transition:background .2s,transform .14s;flex-shrink:0;
    }
    .nav-cta:hover{background:var(--gold2);transform:translateY(-1px)}

    /* HERO */
    .hero{
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:8rem 2rem 5rem;
      position:relative;overflow:hidden;
    }
    /* ambient glow */
    .hero::before{
      content:'';position:absolute;top:20%;left:50%;
      transform:translate(-50%,-50%);
      width:700px;height:700px;border-radius:50%;
      background:radial-gradient(circle,rgba(201,168,76,.07) 0%,transparent 65%);
      pointer-events:none;
    }

    .hero-label{
      font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.28em;
      text-transform:uppercase;color:var(--gold);margin-bottom:2rem;
      opacity:0;animation:fadeUp .6s .1s forwards;
    }

    .hero-title{
      font-size:clamp(2.8rem,8vw,6.5rem);font-weight:900;
      line-height:1.05;text-align:center;max-width:900px;
      color:var(--white);letter-spacing:-.01em;
      opacity:0;animation:fadeUp .7s .25s forwards;
    }
    .hero-title .gold{color:var(--gold)}

    .hero-sub{
      margin-top:1.5rem;font-size:1.05rem;color:var(--muted2);
      text-align:center;max-width:580px;line-height:1.75;
      opacity:0;animation:fadeUp .7s .45s forwards;
    }

    .hero-actions{
      display:flex;gap:1rem;margin-top:2.8rem;
      opacity:0;animation:fadeUp .7s .6s forwards;
    }
    .btn-gold{
      font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;
      color:var(--bg);background:var(--gold);
      padding:.9rem 2rem;border-radius:8px;text-decoration:none;
      display:inline-flex;align-items:center;gap:.5rem;
      transition:background .2s,transform .14s;
    }
    .btn-gold:hover{background:var(--gold2);transform:translateY(-2px)}
    .btn-outline{
      font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;
      color:var(--gold);border:1px solid rgba(201,168,76,.35);
      padding:.9rem 2rem;border-radius:8px;text-decoration:none;
      display:inline-flex;align-items:center;gap:.5rem;
      transition:border-color .2s,transform .14s;
    }
    .btn-outline:hover{border-color:var(--gold);transform:translateY(-2px)}

    /* STACK DIAGRAM */
    .stack-wrap{
      margin-top:4rem;width:100%;max-width:680px;
      opacity:0;animation:fadeUp .8s .8s forwards;
    }
    .stack-card{
      background:radial-gradient(ellipse at 50% 0%,#1c1a10,var(--card));
      border:1px solid rgba(201,168,76,.2);
      border-radius:20px;padding:3rem 2.5rem 2.5rem;
      position:relative;overflow:hidden;
      box-shadow:0 0 60px rgba(201,168,76,.06),0 20px 60px rgba(0,0,0,.4);
    }
    .stack-card::before{
      content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);
      width:300px;height:300px;border-radius:50%;
      background:radial-gradient(circle,rgba(201,168,76,.12) 0%,transparent 65%);
      pointer-events:none;
    }
    /* concentric rings inside card */
    .stack-rings{
      position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);
      pointer-events:none;
    }
    .stack-ring{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      border-radius:50%;border:1px solid rgba(201,168,76,.08);
    }
    .stack-ring:nth-child(1){width:180px;height:180px}
    .stack-ring:nth-child(2){width:300px;height:300px;border-color:rgba(201,168,76,.05)}
    .stack-ring:nth-child(3){width:420px;height:420px;border-color:rgba(201,168,76,.03)}

    .stack-center{
      position:relative;z-index:1;
      width:160px;height:160px;border-radius:24px;
      background:radial-gradient(135deg at 30% 25%,#2a2210,#0d0d0d);
      border:1px solid rgba(201,168,76,.3);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      margin:0 auto 2rem;
      box-shadow:0 0 40px rgba(201,168,76,.12),0 8px 32px rgba(0,0,0,.5);
    }
    .stack-center-label{
      font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.18em;
      text-transform:uppercase;color:var(--gold);margin-top:.4rem;
    }
    .stack-center svg{width:32px;height:32px;opacity:.6}

    .stack-pills{
      position:relative;z-index:1;
      display:grid;grid-template-columns:1fr 1fr;gap:.75rem;
    }
    .stack-pill{
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
      border-radius:10px;padding:.85rem 1.1rem;
      font-size:.8rem;color:var(--text);
      display:flex;align-items:center;gap:.6rem;
      transition:background .25s,border-color .25s;cursor:default;
    }
    .stack-pill:hover{background:rgba(201,168,76,.06);border-color:rgba(201,168,76,.25)}
    .stack-pill strong{color:var(--white);font-weight:600}
    .stack-pill-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0}

    /* SCROLLING PILL ROW */
    .scroll-row{
      overflow:hidden;border-top:1px solid var(--border);
      border-bottom:1px solid var(--border);
      background:var(--card);padding:.75rem 0;margin-top:0;
    }
    .scroll-track{display:flex;animation:mqs 28s linear infinite;white-space:nowrap}
    .scroll-item{
      display:inline-flex;align-items:center;gap:1.2rem;padding:0 2rem;
      font-family:'DM Mono',monospace;font-size:.62rem;
      letter-spacing:.18em;text-transform:uppercase;color:var(--muted2);
    }
    .scroll-gem{color:var(--gold);font-size:.45rem}

    /* MAIN CONTENT WRAPPER */
    .page{max-width:1100px;margin:0 auto;padding:0 2rem}

    /* SECTION LABEL */
    .s-eyebrow{
      font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.26em;
      text-transform:uppercase;color:var(--gold);margin-bottom:1rem;
    }
    .s-title{
      font-size:clamp(2rem,4vw,3.2rem);font-weight:800;
      color:var(--white);line-height:1.1;letter-spacing:-.01em;
    }
    .s-title .gold{color:var(--gold)}
    .s-sub{font-size:1rem;color:var(--muted2);line-height:1.75;margin-top:1rem;max-width:520px}

    /* CARD GRID */
    .card-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-top:3rem}
    .card-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-top:3rem}
    .card-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-top:3rem}

    .g-card{
      background:var(--card);padding:2.2rem 2rem;
      transition:background .25s;position:relative;overflow:hidden;
    }
    .g-card:hover{background:var(--card2)}
    .g-card::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
      transform:scaleX(0);transform-origin:center;transition:transform .35s;
    }
    .g-card:hover::after{transform:scaleX(1)}

    .g-card-num{
      font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.2em;
      color:var(--muted);margin-bottom:1.4rem;
    }
    .g-card-icon{
      width:38px;height:38px;border-radius:10px;
      background:var(--gold-dim);border:1px solid rgba(201,168,76,.2);
      display:flex;align-items:center;justify-content:center;
      margin-bottom:1.4rem;transition:background .25s,border-color .25s;
    }
    .g-card:hover .g-card-icon{background:rgba(201,168,76,.2);border-color:rgba(201,168,76,.4)}
    .g-card-icon svg{stroke:var(--gold);width:18px;height:18px}
    .g-card-title{font-size:1rem;font-weight:700;color:var(--white);margin-bottom:.5rem}
    .g-card-desc{font-size:.88rem;color:var(--muted2);line-height:1.7}
    .g-card-list{list-style:none;margin-top:1.2rem}
    .g-card-list li{
      font-size:.82rem;color:var(--muted2);line-height:1.6;
      padding:.32rem 0;border-bottom:1px solid var(--border);
      display:flex;align-items:flex-start;gap:.55rem;
    }
    .g-card-list li:last-child{border-bottom:none}
    .g-card-list li::before{content:'→';color:var(--gold);flex-shrink:0;font-size:.75rem}

    /* BIG SECTION BLOCK */
    .section-block{padding:6rem 0}
    .section-block.dark{background:var(--card);margin:0 -2rem;padding:6rem 2rem}
    .section-header{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:end;margin-bottom:4rem}

    /* DISCIPLINE ROWS */
    .disc-list{display:flex;flex-direction:column;gap:1px;border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-top:3rem}
    .disc-row{
      display:grid;grid-template-columns:56px 1fr 1fr;
      background:var(--card);transition:background .25s;
    }
    .disc-row:hover{background:var(--card2)}
    .disc-row-num{
      display:flex;align-items:center;justify-content:center;
      border-right:1px solid var(--border);
      font-size:1.4rem;font-weight:800;color:rgba(201,168,76,.18);
      font-family:'DM Mono',monospace;
    }
    .disc-row-main{padding:2rem;border-right:1px solid var(--border)}
    .disc-row-title{font-size:.95rem;font-weight:700;color:var(--white);margin-bottom:.4rem}
    .disc-row-def{font-size:.86rem;color:var(--muted2);line-height:1.7;font-style:italic}
    .disc-row-aspects{padding:2rem}
    .disc-asp-label{font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.9rem}
    .disc-asp-items{list-style:none}
    .disc-asp-items li{font-size:.82rem;color:var(--muted2);line-height:1.6;padding:.28rem 0;border-bottom:1px solid var(--border);display:flex;gap:.5rem;align-items:flex-start}
    .disc-asp-items li:last-child{border-bottom:none}
    .disc-asp-items li::before{content:'·';color:var(--gold);flex-shrink:0}

    /* PRIME ENGINE */
    .pe-box{
      background:var(--card);border:1px solid var(--border);border-radius:16px;
      padding:2.5rem;margin-top:3rem;overflow:hidden;position:relative;
    }
    .pe-box::before{
      content:'';position:absolute;top:-40px;right:-40px;
      width:200px;height:200px;border-radius:50%;
      background:radial-gradient(circle,rgba(201,168,76,.06) 0%,transparent 65%);
      pointer-events:none;
    }
    .pe-label{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:2rem}
    .pe-flow{display:flex;align-items:stretch;gap:0}
    .pe-phase{
      flex:1;padding:1.6rem 1.2rem;border:1px solid var(--border);border-radius:10px;
      text-align:center;background:rgba(255,255,255,.02);transition:background .25s;cursor:default;margin:0 2px;
    }
    .pe-phase:hover{background:rgba(201,168,76,.04)}
    .pe-phase-n{font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.16em;color:var(--muted);margin-bottom:.6rem}
    .pe-phase-name{font-size:.88rem;font-weight:700;color:var(--white);margin-bottom:.4rem}
    .pe-phase-desc{font-size:.75rem;color:var(--muted2);line-height:1.6}
    .pe-arr{color:var(--gold);font-size:.8rem;display:flex;align-items:center;padding:0 .1rem;flex-shrink:0;opacity:.5}

    /* LICENSING */
    .lic-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-top:3rem}
    .lic-card{
      background:var(--card);padding:2rem 1.6rem;
      transition:background .25s;position:relative;
    }
    .lic-card:hover{background:var(--card2)}
    .lic-card.featured{background:linear-gradient(160deg,#1a1808,var(--card))}
    .lic-badge{
      display:inline-block;
      font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;
      background:var(--gold);color:var(--bg);padding:.18rem .55rem;border-radius:4px;
      margin-bottom:1rem;
    }
    .lic-tier{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted2);margin-bottom:.7rem}
    .lic-name{font-size:.95rem;font-weight:700;color:var(--white);margin-bottom:.3rem;line-height:1.2}
    .lic-inv{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.1em;color:var(--gold);margin-bottom:1.1rem}
    .lic-desc{font-size:.82rem;color:var(--muted2);line-height:1.65;margin-bottom:1.3rem}
    .lic-feats{list-style:none;margin-bottom:1.6rem}
    .lic-feats li{font-size:.76rem;color:var(--muted2);padding:.32rem 0;border-bottom:1px solid var(--border);display:flex;gap:.45rem;align-items:flex-start}
    .lic-feats li:last-child{border-bottom:none}
    .lic-feats li::before{content:'→';color:var(--gold);flex-shrink:0;font-size:.7rem}
    .lic-note{
      margin-top:2rem;padding:1.4rem 1.6rem;
      background:rgba(201,168,76,.04);border:1px solid rgba(201,168,76,.15);
      border-radius:10px;font-size:.8rem;color:var(--muted2);line-height:1.7;
    }
    .lic-note strong{color:var(--text)}

    /* CERT TABS */
    .cert-tabs{display:flex;gap:.5rem;margin-top:3rem;margin-bottom:0}
    .cert-tab{
      flex:1;padding:1rem 1.2rem;
      font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;
      color:var(--muted2);background:var(--card);border:1px solid var(--border);
      border-radius:10px 10px 0 0;border-bottom:none;
      cursor:pointer;transition:background .2s,color .2s;text-align:left;line-height:1.5;
    }
    .cert-tab.active{background:var(--card2);color:var(--gold);border-color:rgba(201,168,76,.25)}
    .cert-tab:hover:not(.active){background:var(--card2);color:var(--text)}
    .cert-panel{display:none;border:1px solid rgba(201,168,76,.15);border-radius:0 0 16px 16px;overflow:hidden}
    .cert-panel.active{display:grid;grid-template-columns:1fr 1fr}
    .cert-left{padding:2.5rem;background:var(--card);border-right:1px solid var(--border)}
    .cert-right{padding:2.5rem;background:var(--card2)}
    .cert-abbr{font-size:2rem;font-weight:900;color:var(--gold);letter-spacing:-.01em;line-height:1}
    .cert-full{font-size:.9rem;font-weight:700;color:var(--white);margin:.3rem 0 .9rem;letter-spacing:.01em}
    .cert-scope{font-size:.86rem;color:var(--muted2);line-height:1.75;font-style:italic;margin-bottom:1.4rem}
    .cert-prereq{
      font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.08em;
      color:var(--muted2);padding:.65rem 1rem;
      border-left:2px solid var(--gold);background:var(--gold-dim);
      border-radius:0 6px 6px 0;margin-bottom:1.8rem;line-height:1.6;
    }
    .mod-item{padding:.85rem 1rem;background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:8px;margin-bottom:.4rem;transition:background .2s}
    .mod-item:hover{background:rgba(201,168,76,.04)}
    .mod-head{display:flex;align-items:center;gap:.6rem;margin-bottom:.25rem}
    .mod-code{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.14em;color:var(--gold)}
    .mod-title{font-size:.84rem;font-weight:600;color:var(--white)}
    .mod-desc{font-size:.78rem;color:var(--muted2);line-height:1.6}
    .exam-box{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:12px;padding:1.6rem;margin-bottom:1.4rem}
    .exam-lbl{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:1.2rem;padding-bottom:.55rem;border-bottom:1px solid var(--border)}
    .exam-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1.2rem}
    .exam-cell{padding:.65rem .8rem;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:7px}
    .exam-cell-lbl{font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.25rem}
    .exam-cell-val{font-size:.8rem;color:var(--text);line-height:1.4}
    .exam-w-row{display:flex;align-items:center;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:6px;margin-bottom:.3rem;overflow:hidden}
    .exam-w-sec{flex:1;padding:.45rem .7rem;font-size:.78rem;color:var(--muted2)}
    .exam-w-pct{width:46px;flex-shrink:0;padding:.45rem .65rem;font-family:'DM Mono',monospace;font-size:.64rem;color:var(--gold);border-left:1px solid var(--border);text-align:right}
    .tl-lbl{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin:1.4rem 0 .8rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
    .tl-row{display:grid;grid-template-columns:78px 1fr;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:6px;margin-bottom:.3rem;overflow:hidden}
    .tl-wk{padding:.7rem .8rem;border-right:1px solid var(--border);font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.1em;color:var(--gold);display:flex;align-items:center}
    .tl-body{padding:.7rem .9rem}
    .tl-focus{font-size:.8rem;font-weight:600;color:var(--white);margin-bottom:.15rem}
    .tl-act{font-size:.75rem;color:var(--muted2);line-height:1.55}

    /* MATRIX */
    .matrix-wrap{overflow-x:auto;margin-top:2rem;border:1px solid var(--border);border-radius:12px;overflow:hidden}
    table.mtx{width:100%;border-collapse:collapse}
    table.mtx th{font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted2);padding:.55rem .7rem;background:var(--card2);border-bottom:1px solid var(--border);text-align:center}
    table.mtx th:first-child{text-align:left}
    table.mtx td{padding:.5rem .7rem;border-bottom:1px solid var(--border);font-size:.76rem;color:var(--muted2)}
    table.mtx td:first-child{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--text)}

<script>
  const io=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('in');io.unobserve(x.target)}})},{threshold:.08});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
  function showCert(id,btn){
    document.querySelectorAll('.cert-panel').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.cert-tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('cert-'+id).classList.add('active');
    btn.classList.add('active');
  }
  // Active nav highlight
  const sections=document.querySelectorAll('section[id]');
  const links=document.querySelectorAll('.nav-link');
  window.addEventListener('scroll',()=>{
    let cur='';
    sections.forEach(s=>{if(window.scrollY>=s.offsetTop-100)cur=s.id});
    links.forEach(l=>{l.classList.toggle('active',l.getAttribute('href')==='#'+cur)});
  });
</script>
